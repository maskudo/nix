config-version = 2

# In i3, all workspaces are phantom
persistent-workspaces = []

# i3 doesn't have "normalizations" feature that why we disable them here.
# But the feature i very helpful.
# Normalizations eliminate all sorts of weird tree configurations that don't make sense.
# Give normalizations a chance and enable them back.
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false
accordion-padding = 10

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

[mode.main.binding]
    # See: https://nikitabobko.github.io/AeroSpace/goodies#open-a-new-window-with-applescript
    alt-enter = ['exec-and-forget open -a kitty']
    cmd-enter = ['exec-and-forget open -a kitty']

    cmd-h = [] # Disable "hide application"
    cmd-alt-h = [] # Disable "hide others"

    # i3 wraps focus by default
    alt-h =         'focus --boundaries-action wrap-around-the-workspace left'
    alt-j =         'focus --boundaries-action wrap-around-the-workspace down'
    alt-k =         'focus --boundaries-action wrap-around-the-workspace up'
    alt-l =         'focus --boundaries-action wrap-around-the-workspace right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-ctrl-h = 'join-with left'
    alt-ctrl-j = 'join-with down'
    alt-ctrl-k = 'join-with up'
    alt-ctrl-l = 'join-with right'

    # Consider using 'join-with' command as a 'split' replacement if you want to enable
    # normalizations
    alt-x = 'split horizontal'
    alt-y = 'split vertical'
    alt-tab = 'workspace-back-and-forth'

    alt-shift-f = 'fullscreen'

    alt-q = 'layout v_accordion' # 'layout stacking' in i3
    alt-w = 'layout h_accordion' # 'layout tabbed' in i3
    alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3
    alt-shift-r = 'reload-config' # 'layout toggle split' in i3

    alt-shift-space = 'layout floating tiling' # 'floating toggle' in i3
    alt-s = 'exec-and-forget screencapture -i -x -P'

    # Scratchpads (mirrors mango toggle_named_scratchpad bindings)
    # bash -l -c ensures login shell PATH and tilde expansion
    alt-backslash = 'exec-and-forget bash -l -c "~/.local/bin/scripts/aerospace-scratch scratchterm kitty --title scratchterm"'
    alt-f         = 'exec-and-forget bash -l -c "~/.local/bin/scripts/aerospace-scratch scratchyazi kitty --title scratchyazi -e yazi ~"'
    alt-b         = 'exec-and-forget bash -l -c "~/.local/bin/scripts/aerospace-scratch scratchbtop kitty --title scratchbtop -e btop"'
    alt-n         = 'exec-and-forget bash -l -c "~/.local/bin/scripts/aerospace-scratch scratchnote kitty --title scratchnote -e nvim ~/zt/notes/inbox/todo.md"'
    alt-shift-n   = 'exec-and-forget bash -l -c "~/.local/bin/scripts/aerospace-scratch scratchworknote kitty --title scratchworknote -e nvim ~/zt/notes/inbox/todo-work.md"'
    alt-p         = 'exec-and-forget bash -l -c "~/.local/bin/scripts/aerospace-scratch scratchpass kitty --title scratchpass -e sh -c ~/.local/bin/scripts/passwords"'
    alt-c         = 'exec-and-forget bash -l -c "~/.local/bin/scripts/aerospace-scratch scratchcal kitty --title scratchcal -e calcurse"'
    # alt-v         = 'exec-and-forget bash -l -c "~/.local/bin/scripts/aerospace-scratch scratchclip kitty --title scratchclip -e sh -c ~/.local/bin/scripts/clipboard"'

    # Not supported, because this command is redundant in AeroSpace mental model.
    # See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
    #alt-space = 'focus toggle_tiling_floating'

    # `focus parent`/`focus child` are not yet supported, and it's not clear whether they
    # should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
    # alt-a = 'focus parent'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-0 = 'workspace 10'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-0 = 'move-node-to-workspace 10'

    # cmd-1 = 'workspace 1'
    # cmd-2 = 'workspace 2'
    # cmd-3 = 'workspace 3'
    # cmd-4 = 'workspace 4'
    # cmd-5 = 'workspace 5'
    # cmd-6 = 'workspace 6'
    # cmd-7 = 'workspace 7'
    # cmd-8 = 'workspace 8'
    # cmd-9 = 'workspace 9'
    # cmd-0 = 'workspace 10'
    #
    # cmd-shift-1 = 'move-node-to-workspace 1'
    # cmd-shift-2 = 'move-node-to-workspace 2'
    # cmd-shift-3 = 'move-node-to-workspace 3'
    # cmd-shift-4 = 'move-node-to-workspace 4'
    # cmd-shift-5 = 'move-node-to-workspace 5'
    # cmd-shift-6 = 'move-node-to-workspace 6'
    # cmd-shift-7 = 'move-node-to-workspace 7'
    # cmd-shift-8 = 'move-node-to-workspace 8'
    # cmd-shift-9 = 'move-node-to-workspace 9'
    # cmd-shift-0 = 'move-node-to-workspace 10'
    #
    alt-shift-c = 'reload-config'

    # alt-r = 'mode resize'

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'


[[on-window-detected]]
if.app-name-regex-substring = 'Zen'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-name-regex-substring = 'Vesktop|Discord'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.window-title-regex-substring = '^scratch'
run = ['layout floating']
